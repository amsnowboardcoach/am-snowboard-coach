name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: placeholder
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: am-snowboard-coach.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: am-snowboard-coach
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: am-snowboard-coach.firebasestorage.app
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "000000000000"
          NEXT_PUBLIC_FIREBASE_APP_ID: "1:000000000000:web:0000000000000000000000"
          NEXT_PUBLIC_APP_URL: https://am-snowboard-coach-green.vercel.app
          NEXT_PUBLIC_DEFAULT_COACH_ID: ci-placeholder-coach-uid
